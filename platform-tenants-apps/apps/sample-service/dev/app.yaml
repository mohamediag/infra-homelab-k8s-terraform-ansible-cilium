apiVersion: platform.homelab.io/v1alpha1
kind: App
metadata:
  name: sample-service-dev
  namespace: gitops-claims
spec:
  parameters:
    name: sample-service
    owner: team-platform
    environment: dev
    image: ghcr.io/example/sample-service:latest
    port: 8080
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    config:
      LOG_LEVEL: debug
    secrets:
      - DATABASE_URL
    exposure:
      type: none
      host: sample-service-dev.example.com
    healthCheck:
      liveness: /healthz
      readiness: /readyz
    metrics:
      enabled: true
      path: /metrics
