apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/mohamediag/infra-homelab-k8s-terraform-ansible-cilium.git
        revision: main
        directories:
          - path: platform-tenants-apps-dev/*/*
          - path: platform-tenants-apps-staging/*/*
          - path: platform-tenants-apps-prod/*/*
  template:
    metadata:
      # path layout: platform-tenants-apps-<env>/<team>/<application>
      # path[0]=platform-tenants-apps-<env>, path[1]=team, path[2]=application
      name: '{{index .path.segments 1}}-{{index .path.segments 2}}-{{trimPrefix "platform-tenants-apps-" (index .path.segments 0)}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: applicationset
        app.platform.homelab.io/team: '{{index .path.segments 1}}'
        app.platform.homelab.io/application: '{{index .path.segments 2}}'
        app.platform.homelab.io/environment: '{{trimPrefix "platform-tenants-apps-" (index .path.segments 0)}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/mohamediag/infra-homelab-k8s-terraform-ansible-cilium.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        # application-env namespace: <application>-<env>
        namespace: '{{index .path.segments 2}}-{{trimPrefix "platform-tenants-apps-" (index .path.segments 0)}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - SkipDryRunOnMissingResource=true
