name: sample-service
application: sample-application
team: team-platform
port: 80
healthCheck:
  liveness: /
  readiness: /
metrics:
  enabled: false
  path: /metrics
exposure:
  type: none
  host: sample-service.example.com
config:
  default:
    LOG_LEVEL: debug
secrets:
  - DUMMY_SECRET
environments:
  dev:
    replicas: 1
    resources:
      cpu: 25m/100m
      memory: 32Mi/64Mi
