---
# ==============================================================================
# roles/workers/tasks/main.yml
# ==============================================================================
# Joins worker nodes to the Kubernetes cluster.
# Retrieves the join command from cp-01's Ansible facts
# (set by the control-plane role in the previous play).
# ==============================================================================

# ── Check if already joined ───────────────────────────────────────────────────

- name: Check if node has already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

# ── Join the cluster ──────────────────────────────────────────────────────────

- name: Join cluster using command from cp-01
  ansible.builtin.command: >
    {{ hostvars[control_plane_host][kubeadm_join_fact] }}
  when: not kubelet_conf.stat.exists
  register: join_result
  changed_when: true

- name: Show join result
  ansible.builtin.debug:
    msg: "{{ join_result.stdout_lines }}"
  when: join_result.changed

# ── Verify node joined ────────────────────────────────────────────────────────
# Run on the control plane to verify this worker appears in node list

- name: Verify node appears in cluster (check on cp-01)
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }} --no-headers
  delegate_to: "{{ control_plane_host }}"
  become_user: kubeadmin
  register: node_status
  retries: 10
  delay: 10
  until: node_status.rc == 0
  changed_when: false

- name: Show node status
  ansible.builtin.debug:
    msg: "Node {{ inventory_hostname }} joined: {{ node_status.stdout }}"
