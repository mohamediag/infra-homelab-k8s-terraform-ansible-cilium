---
# ==============================================================================
# roles/cluster-essentials/tasks/main.yml
# ==============================================================================
# Installs essential cluster add-ons:
#   1. MetalLB — LoadBalancer IP assignment for bare-metal
#   2. metrics-server — Pod/node resource metrics (for kubectl top / HPA)
#   3. cert-manager — Automatic TLS certificate management
#   4. Nginx Ingress Controller — HTTP/HTTPS routing for applications
# ==============================================================================

# ── MetalLB ───────────────────────────────────────────────────────────────────
# MetalLB provides LoadBalancer service type on bare-metal clusters.
# In L2 mode, it responds to ARP requests for LoadBalancer IPs.

- name: Get latest MetalLB version
  ansible.builtin.uri:
    url: https://api.github.com/repos/metallb/metallb/releases/latest
    return_content: yes
  register: metallb_release

- name: Set MetalLB version fact
  ansible.builtin.set_fact:
    metallb_version: "{{ metallb_release.json.tag_name }}"

- name: Apply MetalLB manifests
  ansible.builtin.command: >
    kubectl apply -f
    https://raw.githubusercontent.com/metallb/metallb/{{ metallb_version }}/config/manifests/metallb-native.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: metallb_apply
  changed_when: "'created' in metallb_apply.stdout or 'configured' in metallb_apply.stdout"

- name: Wait for MetalLB controller to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/controller -n metallb-system --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Copy MetalLB IP address pool manifest
  ansible.builtin.copy:
    src: manifests/metallb-pool.yml
    dest: /tmp/metallb-pool.yml
    mode: "0644"

- name: Copy MetalLB L2Advertisement manifest
  ansible.builtin.copy:
    src: manifests/metallb-l2advert.yml
    dest: /tmp/metallb-l2advert.yml
    mode: "0644"

- name: Apply MetalLB IP address pool
  ansible.builtin.command: kubectl apply -f /tmp/metallb-pool.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: pool_apply
  changed_when: "'created' in pool_apply.stdout or 'configured' in pool_apply.stdout"

- name: Apply MetalLB L2Advertisement
  ansible.builtin.command: kubectl apply -f /tmp/metallb-l2advert.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: l2advert_apply
  changed_when: "'created' in l2advert_apply.stdout or 'configured' in l2advert_apply.stdout"

# ── metrics-server ────────────────────────────────────────────────────────────
# metrics-server provides CPU/memory metrics for `kubectl top` and HPA.
# --kubelet-insecure-tls: required in self-signed cert environments
# --kubelet-preferred-address-types=InternalIP: use VM IPs, not hostnames

- name: Get latest metrics-server version
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes-sigs/metrics-server/releases/latest
    return_content: yes
  register: metrics_server_release

- name: Set metrics-server version fact
  ansible.builtin.set_fact:
    metrics_server_version: "{{ metrics_server_release.json.tag_name }}"

- name: Download metrics-server manifest
  ansible.builtin.get_url:
    url: "https://github.com/kubernetes-sigs/metrics-server/releases/download/{{ metrics_server_version }}/components.yaml"
    dest: /tmp/metrics-server.yaml
    mode: "0644"

# Patch metrics-server deployment to add required flags
- name: Add --kubelet-insecure-tls and InternalIP flags to metrics-server
  ansible.builtin.replace:
    path: /tmp/metrics-server.yaml
    regexp: '(\s+)(- --metric-resolution=15s)'
    replace: '\1\2\n\1- --kubelet-insecure-tls\n\1- --kubelet-preferred-address-types=InternalIP'

- name: Apply metrics-server
  ansible.builtin.command: kubectl apply -f /tmp/metrics-server.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: metrics_apply
  changed_when: "'created' in metrics_apply.stdout or 'configured' in metrics_apply.stdout"

- name: Wait for metrics-server to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

# ── cert-manager ──────────────────────────────────────────────────────────────
# cert-manager automates TLS certificate issuance and renewal.
# Supports Let's Encrypt, self-signed, and other issuers.

- name: Get latest cert-manager version
  ansible.builtin.uri:
    url: https://api.github.com/repos/cert-manager/cert-manager/releases/latest
    return_content: yes
  register: cert_manager_release

- name: Set cert-manager version fact
  ansible.builtin.set_fact:
    cert_manager_version: "{{ cert_manager_release.json.tag_name }}"

- name: Apply cert-manager manifests
  ansible.builtin.command: >
    kubectl apply -f
    https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: certmanager_apply
  changed_when: "'created' in certmanager_apply.stdout or 'configured' in certmanager_apply.stdout"

- name: Wait for cert-manager to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/cert-manager -n cert-manager --timeout=180s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=180s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

# Give the webhook time to register its webhooks
- name: Wait for cert-manager webhook to be fully operational
  ansible.builtin.pause:
    seconds: 15

- name: Create Let's Encrypt staging ClusterIssuer
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
      spec:
        acme:
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          email: admin@example.com
          privateKeySecretRef:
            name: letsencrypt-staging
          solvers:
            - http01:
                ingress:
                  class: nginx
  environment:
    KUBECONFIG: /root/.kube/config
  register: issuer_apply
  changed_when: "'created' in issuer_apply.stdout or 'configured' in issuer_apply.stdout"

# ── Nginx Ingress Controller ──────────────────────────────────────────────────
# Nginx Ingress handles HTTP/HTTPS routing to services.
# MetalLB will assign it an IP from the 10.0.0.200-250 pool.

- name: Get latest Nginx Ingress Controller version
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes/ingress-nginx/releases/latest
    return_content: yes
  register: nginx_ingress_release

- name: Set Nginx Ingress version fact
  ansible.builtin.set_fact:
    nginx_ingress_version: "{{ nginx_ingress_release.json.tag_name }}"

- name: Apply Nginx Ingress Controller
  ansible.builtin.command: >
    kubectl apply -f
    https://raw.githubusercontent.com/kubernetes/ingress-nginx/{{ nginx_ingress_version }}/deploy/static/provider/baremetal/deploy.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: nginx_apply
  changed_when: "'created' in nginx_apply.stdout or 'configured' in nginx_apply.stdout"

- name: Wait for Nginx Ingress Controller to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=180s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

# Patch the Nginx service to use LoadBalancer type (MetalLB will assign an IP)
- name: Patch Nginx Ingress service to use LoadBalancer type
  ansible.builtin.command: >
    kubectl patch svc ingress-nginx-controller -n ingress-nginx
    -p '{"spec":{"type":"LoadBalancer"}}'
  environment:
    KUBECONFIG: /root/.kube/config
  register: svc_patch
  changed_when: true
  failed_when: false

# ── Final status ──────────────────────────────────────────────────────────────

- name: Show all cluster add-on pods
  ansible.builtin.command: kubectl get pods -A --field-selector=status.phase!=Running
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  register: non_running_pods
  failed_when: false

- name: Show Nginx Ingress LoadBalancer IP (assigned by MetalLB)
  ansible.builtin.command: >
    kubectl get svc ingress-nginx-controller -n ingress-nginx
    -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  register: nginx_lb_ip
  failed_when: false

- name: Display Nginx Ingress IP
  ansible.builtin.debug:
    msg: "Nginx Ingress LoadBalancer IP: {{ nginx_lb_ip.stdout | default('pending - check MetalLB') }}"
