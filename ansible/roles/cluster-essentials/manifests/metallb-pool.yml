# ==============================================================================
# metallb-pool.yml — MetalLB IP Address Pool
# ==============================================================================
# Defines the range of IP addresses MetalLB can assign to LoadBalancer services.
# These IPs are on the internal VM bridge network (10.0.0.0/24).
# Range: 10.0.0.200 - 10.0.0.250 (51 available IPs)
# ==============================================================================

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: k8s-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.0.200-10.0.0.250
