# ==============================================================================
# metallb-l2advert.yml — MetalLB L2 Advertisement
# ==============================================================================
# Configures MetalLB to use L2 (ARP) mode for announcing LoadBalancer IPs.
# In L2 mode, MetalLB responds to ARP requests for IPs in the pool,
# making the Hetzner host act as the "router" for those IPs.
#
# This is the simplest MetalLB mode — no BGP router required.
# ==============================================================================

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: k8s-l2advert
  namespace: metallb-system
spec:
  ipAddressPools:
    - k8s-pool
