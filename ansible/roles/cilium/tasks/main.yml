---
# ==============================================================================
# roles/cilium/tasks/main.yml
# ==============================================================================
# Installs Cilium CNI on the Kubernetes cluster using the Cilium CLI.
# Runs on the control plane node (cp-01).
#
# Cilium is configured with:
#   - kubeProxyReplacement=true: Cilium replaces kube-proxy entirely via eBPF
#   - Hubble relay + UI: Network observability dashboard
#   - Pod CIDR matching kubeadm configuration
# ==============================================================================

# ── Install Cilium CLI ────────────────────────────────────────────────────────

- name: Check if Cilium CLI is already installed
  ansible.builtin.stat:
    path: "{{ cilium_cli_path }}"
  register: cilium_cli_installed

- name: Install Cilium CLI (latest stable)
  ansible.builtin.shell: |
    set -euo pipefail
    # Detect architecture
    ARCH=$(uname -m)
    case "$ARCH" in
      x86_64) ARCH="amd64" ;;
      aarch64) ARCH="arm64" ;;
    esac

    # Get latest stable version
    CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)

    # Download and install
    curl -L --fail \
      "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${ARCH}.tar.gz" \
      | tar xz -C /usr/local/bin

    chmod +x /usr/local/bin/cilium
  args:
    executable: /bin/bash
  when: not cilium_cli_installed.stat.exists
  changed_when: true

- name: Verify Cilium CLI version
  ansible.builtin.command: cilium version --client
  register: cilium_cli_version
  changed_when: false

- name: Show Cilium CLI version
  ansible.builtin.debug:
    msg: "{{ cilium_cli_version.stdout }}"

# ── Install Cilium on the cluster ─────────────────────────────────────────────

- name: Check if Cilium is already installed in the cluster
  ansible.builtin.command: cilium status --brief
  environment:
    KUBECONFIG: /root/.kube/config
  register: cilium_status_check
  changed_when: false
  failed_when: false

- name: Install Cilium with kube-proxy replacement and Hubble
  ansible.builtin.command: |
    cilium install \
      --set kubeProxyReplacement=true \
      --set k8sServiceHost={{ ansible_host }} \
      --set k8sServicePort=6443 \
      --set ipam.mode=kubernetes \
      --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }} \
      --set hubble.relay.enabled=true \
      --set hubble.ui.enabled=true
  environment:
    KUBECONFIG: /root/.kube/config
  when: "'cilium' not in cilium_status_check.stdout"
  register: cilium_install_result
  changed_when: true

- name: Show Cilium install output
  ansible.builtin.debug:
    msg: "{{ cilium_install_result.stdout_lines }}"
  when: cilium_install_result.changed

# ── Wait for Cilium to be ready ───────────────────────────────────────────────

- name: Wait for Cilium to become ready (can take several minutes)
  ansible.builtin.command: cilium status --wait --wait-duration 5m
  environment:
    KUBECONFIG: /root/.kube/config
  register: cilium_ready
  changed_when: false
  retries: 3
  delay: 30
  until: cilium_ready.rc == 0

- name: Show Cilium status
  ansible.builtin.debug:
    msg: "{{ cilium_ready.stdout_lines }}"

# ── Verify all nodes are Ready ────────────────────────────────────────────────

- name: Wait for all nodes to be Ready (CNI must be working)
  ansible.builtin.command: kubectl get nodes --no-headers
  environment:
    KUBECONFIG: /root/.kube/config
  register: nodes_status
  retries: 15
  delay: 20
  until: >
    nodes_status.stdout_lines | length > 0 and
    nodes_status.stdout_lines | select('search', 'NotReady') | list | length == 0
  changed_when: false

- name: Show all node statuses
  ansible.builtin.debug:
    msg: "{{ nodes_status.stdout_lines }}"

- name: Run Cilium connectivity test
  ansible.builtin.command: cilium connectivity test --test-concurrency 4
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false  # Don't fail the play if connectivity test has issues
  register: connectivity_test

- name: Show connectivity test result
  ansible.builtin.debug:
    msg: "{{ connectivity_test.stdout_lines[-20:] }}"  # Last 20 lines
