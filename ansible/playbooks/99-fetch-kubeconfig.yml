---
# ==============================================================================
# playbooks/99-fetch-kubeconfig.yml — Fetch kubeconfig from cp-01
# ==============================================================================
# Downloads the kubeconfig from cp-01 to your local machine and rewrites the
# server URL to use the SSH tunnel (127.0.0.1:6443).
#
# After running this, open the tunnel with: make tunnel
# Then use kubectl with: export KUBECONFIG=./kubeconfig-local.yml
# ==============================================================================

- name: Fetch kubeconfig from control plane
  hosts: control_plane
  become: yes
  gather_facts: no

  tasks:
    - name: Read kubeconfig from cp-01
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: raw_kubeconfig

    - name: Decode and save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ raw_kubeconfig.content | b64decode | replace('https://' + ansible_host + ':6443', 'https://127.0.0.1:6443') }}"
        dest: "{{ playbook_dir }}/../../kubeconfig-local.yml"
        mode: "0600"
      delegate_to: localhost
      become: no

    - name: Show usage instructions
      ansible.builtin.debug:
        msg:
          - "Kubeconfig saved to: kubeconfig-local.yml"
          - "Server URL rewritten to: https://127.0.0.1:6443 (for SSH tunnel)"
          - ""
          - "To use kubectl:"
          - "  1. make tunnel            # Open SSH tunnel (run once)"
          - "  2. export KUBECONFIG=./kubeconfig-local.yml"
          - "  3. kubectl get nodes"
      delegate_to: localhost
      become: no
