---
# ==============================================================================
# playbooks/05-workers.yml — Join worker nodes to the cluster
# ==============================================================================
# Uses the join command generated by 04-control-plane.yml to join workers.
# Requires 04-control-plane.yml to have run in the same session (in-memory facts).
#
# NOTE: If running individually (not via site.yml), you must run
# 04-control-plane.yml first in the same ansible-playbook invocation,
# or generate a new token manually with: kubeadm token create --print-join-command
# ==============================================================================

# Re-run control-plane play to repopulate the join command fact
# (needed if this playbook is run standalone)
- name: Gather join command from control plane
  hosts: control_plane
  become: yes
  gather_facts: yes
  tasks:
    - name: Generate kubeadm join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Set join command as fact
      ansible.builtin.set_fact:
        "{{ kubeadm_join_fact }}": "{{ join_command_raw.stdout }}"

- name: Join worker nodes to the cluster
  hosts: workers
  become: yes
  gather_facts: yes

  roles:
    - role: workers
