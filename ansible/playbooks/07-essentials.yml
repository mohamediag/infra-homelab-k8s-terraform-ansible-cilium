---
# ==============================================================================
# playbooks/07-essentials.yml — Install cluster essential add-ons
# ==============================================================================
# Installs MetalLB, metrics-server, cert-manager, and Nginx Ingress Controller.
# Runs on the control plane node (cp-01) using kubectl.
# ==============================================================================

- name: Install cluster essential add-ons
  hosts: control_plane
  become: yes
  gather_facts: yes

  roles:
    - role: cluster-essentials
