# ==============================================================================
# ansible.cfg — Ansible configuration
# ==============================================================================
# This file configures Ansible's behavior for the homelab K8s project.
# Run from the ansible/ directory or set ANSIBLE_CONFIG env var.
# ==============================================================================

[defaults]
# Inventory generated by Terraform (gitignored)
inventory = inventory/hosts.yml

# Default user for VMs — overridden per group in group_vars/
remote_user = kubeadmin

# Disable host key checking (VMs are freshly created with known IPs)
host_key_checking = False

# Increase SSH timeout for slow-starting VMs
timeout = 30

# Retry failed hosts file (avoid cluttering repo)
retry_files_enabled = False

# Show task timing information
callback_whitelist = profile_tasks

# Roles path
roles_path = roles

# Forks — run tasks on multiple hosts in parallel
forks = 10

# Gather facts explicitly in each play — disable implicit gather for speed
gathering = smart
fact_caching = memory

[ssh_connection]
# Pipelining avoids the need for requiretty in sudoers — significant speedup
pipelining = True

# SSH args applied to all connections
# - ControlMaster/ControlPersist: SSH multiplexing (reuse connections)
# - StrictHostKeyChecking=no: don't prompt for new host keys
# - UserKnownHostsFile=/dev/null: don't write to known_hosts
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[privilege_escalation]
# All VMs have kubeadmin with passwordless sudo
become = True
become_method = sudo
become_user = root
become_ask_pass = False
