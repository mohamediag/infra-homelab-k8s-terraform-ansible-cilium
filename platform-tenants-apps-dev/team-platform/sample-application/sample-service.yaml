apiVersion: platform.homelab.io/v1alpha1
kind: App
metadata:
  name: sample-service
  namespace: sample-application-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crossplane:
    compositionRef:
      name: app-kubernetes
  parameters:
    name: sample-service
    owner: team-platform
    environment: dev
    image: nginx:1.27
    port: 80
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    config:
      LOG_LEVEL: debug
    secrets: []
    exposure:
      type: none
      host: sample-service.example.com
    healthCheck:
      liveness: /
      readiness: /
    metrics:
      enabled: false
      path: /metrics
