# ==============================================================================
# CiliumLoadBalancerIPPool — IP pool for LoadBalancer services
# ==============================================================================
# Replaces MetalLB's IPAddressPool. Cilium LB-IPAM assigns IPs from this pool
# to Services of type LoadBalancer.
# ==============================================================================

apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: k8s-pool
spec:
  blocks:
    - start: "10.0.0.200"
      stop: "10.0.0.250"
