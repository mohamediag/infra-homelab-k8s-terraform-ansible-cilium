# ==============================================================================
# Gateway — Primary HTTP/HTTPS entry point
# ==============================================================================
# Cilium provisions an Envoy proxy for this Gateway and assigns it a
# LoadBalancer IP from the CiliumLoadBalancerIPPool.
#
# HTTPRoutes reference this Gateway as their parentRef to route traffic
# to backend services.
# ==============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: homelab-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
