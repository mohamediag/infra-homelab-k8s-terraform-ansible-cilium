# ==============================================================================
# ClusterSecretStore — points External Secrets Operator at the in-cluster Vault
# ==============================================================================
# ESO authenticates to Vault using the Kubernetes auth method: it presents the
# `external-secrets` ServiceAccount token; Vault verifies it via the K8s
# TokenReview API and returns a Vault token scoped to the `external-secrets`
# Vault role.
#
# This resource will not become Ready until the manual Vault bootstrap is done:
#
#   # 1. Init + unseal Vault (see vault.yaml header)
#
#   # 2. KV v2 at path `secret/`
#   kubectl -n vault exec -it vault-0 -- vault secrets enable \
#     -path=secret -version=2 kv
#
#   # 3. Enable + configure Kubernetes auth
#   kubectl -n vault exec -it vault-0 -- vault auth enable kubernetes
#   kubectl -n vault exec -it vault-0 -- /bin/sh -c '
#     vault write auth/kubernetes/config \
#       kubernetes_host="https://kubernetes.default.svc"'
#
#   # 4. Read policy for ESO
#   kubectl -n vault exec -it vault-0 -- /bin/sh -c '
#     vault policy write external-secrets-read - <<EOF
#     path "secret/data/*"     { capabilities = ["read"] }
#     path "secret/metadata/*" { capabilities = ["read"] }
#     EOF'
#
#   # 5. Bind the ESO ServiceAccount to that policy
#   kubectl -n vault exec -it vault-0 -- vault write \
#     auth/kubernetes/role/external-secrets \
#     bound_service_account_names=external-secrets \
#     bound_service_account_namespaces=external-secrets \
#     policies=external-secrets-read \
#     ttl=1h
#
# After step 5, ArgoCD's selfHeal will retry this resource and it will
# transition to Ready=True.
# ==============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
