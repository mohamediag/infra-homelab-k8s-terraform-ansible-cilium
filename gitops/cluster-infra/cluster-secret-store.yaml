# ==============================================================================
# ClusterSecretStore — points External Secrets Operator at the in-cluster Vault
# ==============================================================================
# ESO authenticates to Vault using the Kubernetes auth method: it presents the
# `external-secrets` ServiceAccount token; Vault verifies it via the K8s
# TokenReview API and returns a Vault token scoped to the `external-secrets`
# Vault role.
#
# This resource depends on the Vault auth bootstrap, which is automated by
# `gitops/vault/manifests/auth-bootstrap-job.yaml` (a PostSync Job on the
# Vault ArgoCD Application). The Job enables KV v2 + Kubernetes auth, writes
# the read-only policy, and binds the ESO ServiceAccount to it.
#
# The two manual steps that remain (one-shot, NOT in git):
#   1. Initialize + unseal Vault (see vault.yaml header)
#   2. Apply the root-token Secret used by the bootstrap Job:
#        kubectl -n vault create secret generic vault-root-token \
#          --from-literal=token=<ROOT_TOKEN>
#
# Once those are done, ArgoCD runs the bootstrap Job and ESO's selfHeal
# transitions this resource to Ready=True.
# ==============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
