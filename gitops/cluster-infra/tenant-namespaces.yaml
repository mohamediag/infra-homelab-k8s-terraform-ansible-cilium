# ==============================================================================
# Tenant team-env namespaces
# ==============================================================================
# One namespace per team per environment. Tenant XRs (App) and their composed
# workloads (Deployment/Service/ConfigMap/ExternalSecret/HTTPRoute) all live
# inside the team-env namespace they belong to. This gives clean RBAC isolation
# at the team boundary and keeps control-plane + data-plane co-located.
#
# Naming convention: <team>-<env>
# ==============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: team-platform-dev
  labels:
    app.platform.homelab.io/team: team-platform
    app.platform.homelab.io/environment: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-platform-staging
  labels:
    app.platform.homelab.io/team: team-platform
    app.platform.homelab.io/environment: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-platform-prod
  labels:
    app.platform.homelab.io/team: team-platform
    app.platform.homelab.io/environment: prod
