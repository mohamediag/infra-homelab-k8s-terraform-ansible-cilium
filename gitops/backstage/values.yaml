# ==============================================================================
# gitops/backstage/values.yaml — Backstage Helm chart values
# ==============================================================================
# App config lives in the Docker image (app-config.yaml + app-config.production.yaml).
# This file only handles k8s-specific concerns: image, resources, env vars, PostgreSQL.
# ==============================================================================

backstage:
  image:
    registry: ghcr.io
    repository: mohamediag/backstage
    tag: latest
    pullPolicy: Always

  command: ["node", "packages/backend", "--config", "app-config.yaml", "--config", "app-config.production.yaml"]

  resources:
    requests:
      memory: 512Mi
    limits:
      memory: 512Mi

  extraEnvVars:
    - name: POSTGRES_HOST
      value: backstage-postgresql
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      value: backstage
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-postgresql
          key: password

# ── PostgreSQL (Bitnami subchart) ─────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: backstage
    password: backstage
    database: backstage
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi
