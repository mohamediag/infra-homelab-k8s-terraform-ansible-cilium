# ==============================================================================
# gitops/backstage/values.yaml — Backstage Helm chart values
# ==============================================================================

backstage:
  image:
    registry: ghcr.io
    repository: mohamediag/backstage
    tag: latest
    pullPolicy: Always

  resources:
    requests:
      memory: 512Mi
    limits:
      memory: 512Mi

  appConfig:
    app:
      title: Homelab Backstage
      baseUrl: https://backstage.homelab.local

    backend:
      baseUrl: https://backstage.homelab.local
      listen:
        port: 7007
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}

  extraEnvVars:
    - name: POSTGRES_HOST
      value: backstage-postgresql
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      value: backstage
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-postgresql
          key: password

# ── PostgreSQL (Bitnami subchart) ─────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: backstage
    password: backstage
    database: backstage
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi
