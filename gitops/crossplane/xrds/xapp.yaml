# ==============================================================================
# XRD: XApp (claim kind: App)
# ==============================================================================

apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xapps.platform.homelab.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  group: platform.homelab.io
  names:
    kind: XApp
    plural: xapps
  claimNames:
    kind: App
    plural: apps
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
                      minLength: 1
                    owner:
                      type: string
                      minLength: 1
                    image:
                      type: string
                      minLength: 1
                    environment:
                      type: string
                      enum:
                        - dev
                        - staging
                        - prod
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                    replicas:
                      type: integer
                      minimum: 1
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                          required:
                            - cpu
                            - memory
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                          required:
                            - cpu
                            - memory
                      required:
                        - requests
                        - limits
                    config:
                      type: object
                      additionalProperties:
                        type: string
                    secrets:
                      type: array
                      items:
                        type: string
                    exposure:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - public
                            - private
                            - none
                        host:
                          type: string
                      required:
                        - type
                        - host
                    healthCheck:
                      type: object
                      properties:
                        liveness:
                          type: string
                        readiness:
                          type: string
                      required:
                        - liveness
                        - readiness
                    metrics:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        path:
                          type: string
                      required:
                        - enabled
                        - path
                  required:
                    - name
                    - owner
                    - image
                    - environment
                    - port
                    - replicas
                    - resources
                    - config
                    - secrets
                    - exposure
                    - healthCheck
                    - metrics
              required:
                - parameters
