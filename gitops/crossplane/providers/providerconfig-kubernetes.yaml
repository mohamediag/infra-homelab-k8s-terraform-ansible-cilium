# ==============================================================================
# ClusterProviderConfig for provider-kubernetes (in-cluster identity, v2 API)
# ==============================================================================
# Cluster-scoped config so namespaced Object MRs in any tenant namespace can
# reference it without per-namespace ProviderConfigs. Uses the provider pod's
# ServiceAccount to talk to the same cluster.
# Keep the name `default` so managed resources can omit providerConfigRef.
# ==============================================================================

apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  credentials:
    source: InjectedIdentity
