# ==============================================================================
# Crossplane provider-kubernetes package
# ==============================================================================
# Installs provider-kubernetes so Compositions can manage in-cluster Kubernetes
# objects through `kubernetes.crossplane.io/Object` managed resources.
# ==============================================================================

apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v1.2.1
