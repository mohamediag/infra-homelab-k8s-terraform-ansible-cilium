# ==============================================================================
# RBAC: grant provider-kubernetes cluster-admin so it can manage arbitrary
# composed resources (Namespace, Deployment, Service, ConfigMap,
# ExternalSecret, HTTPRoute, ...). Pragmatic homelab choice.
#
# Binds the current provider-kubernetes ServiceAccount by name. The SA name is
# derived from the ProviderRevision and changes on package upgrades; if the
# provider package version is bumped, update the subjects.name below.
# ==============================================================================
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-cluster-admin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes-f6665ef36536
    namespace: crossplane-system
