# ==============================================================================
# Gateway API CRDs Application
# ==============================================================================
# Installs the standard-channel Gateway API CRDs from kubernetes-sigs.
# Must sync BEFORE Cilium (which registers a GatewayClass) and cluster-infra
# (which creates Gateway resources).
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: https://gateway-api.sigs.k8s.io/charts
    chart: gateway-api
    targetRevision: v1.2.1
    helm:
      values: |
        webhook:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
