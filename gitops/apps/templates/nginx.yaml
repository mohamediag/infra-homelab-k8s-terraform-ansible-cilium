# ==============================================================================
# Nginx test Application
# ==============================================================================
# Simple nginx deployment to validate the cluster can receive new applications
# and that Gateway API routing works end-to-end.
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: {{ .Values.spec.repoURL }}
    targetRevision: {{ .Values.spec.targetRevision }}
    path: gitops/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx
  syncPolicy:
    {{- toYaml .Values.spec.syncPolicy | nindent 4 }}
