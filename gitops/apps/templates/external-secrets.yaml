# ==============================================================================
# External Secrets Operator (ESO) Application
# ==============================================================================
# Syncs secrets from HashiCorp Vault into Kubernetes Secrets via ExternalSecret
# CRs. Configured cluster-wide via the ClusterSecretStore in
# gitops/cluster-infra/cluster-secret-store.yaml.
#
# The ESO Helm chart installs the CRDs (ExternalSecret, ClusterSecretStore,
# SecretStore, etc.) and a ServiceAccount named `external-secrets` in the
# `external-secrets` namespace — that SA is what the ClusterSecretStore uses
# to authenticate to Vault via the Kubernetes auth method.
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm:
      values: |
        installCRDs: true
        webhook:
          port: 9443
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    {{- toYaml .Values.spec.syncPolicy | nindent 4 }}
