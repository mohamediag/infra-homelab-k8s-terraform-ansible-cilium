# ==============================================================================
# Crossplane Application
# ==============================================================================
# Universal control plane for managing cloud and infrastructure resources via
# Kubernetes APIs. Providers and ProviderConfigs are deployed separately.
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 2.2.1
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    {{- toYaml .Values.spec.syncPolicy | nindent 4 }}
