# ==============================================================================
# Backstage Application
# ==============================================================================
# Developer portal deployed via the official Backstage Helm chart.
# Uses multi-source: Helm chart from backstage.github.io + values from Git.
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  sources:
    # Source 1: Backstage Helm chart
    - repoURL: https://backstage.github.io/charts
      chart: backstage
      targetRevision: 2.6.3
      helm:
        releaseName: backstage
        valueFiles:
          - $values/gitops/backstage/values.yaml
    # Source 2: Values from this Git repo
    - repoURL: {{ .Values.spec.repoURL }}
      targetRevision: {{ .Values.spec.targetRevision }}
      ref: values
    # Source 3: Extra manifests (HTTPRoute)
    - repoURL: {{ .Values.spec.repoURL }}
      targetRevision: {{ .Values.spec.targetRevision }}
      path: gitops/backstage/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    {{- toYaml .Values.spec.syncPolicy | nindent 4 }}
